<!DOCTYPE html>
<html>
<head>
  <title>GIT Driver Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#ffffff;color:#111111;font-family:Arial;min-height:100vh;padding-bottom:30px}
    .header{background:#f5f5f5;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #dddddd}
    .htitle{font-size:1.1rem;font-weight:bold;color:#1a1a1a}
    .hsub{font-size:0.7rem;color:#666666}
    .clock{font-size:1.3rem;font-weight:bold;color:#1a1a1a;font-family:monospace}
    .content{padding:14px;display:flex;flex-direction:column;gap:14px}
    .card{background:#f9f9f9;border-radius:14px;padding:16px;border:1px solid #dddddd}
    .card-title{font-size:0.7rem;letter-spacing:2px;color:#666666;margin-bottom:12px}
    .flabel{font-size:0.72rem;color:#666666;margin-bottom:6px}
    .fvalue{background:#ffffff;border-radius:8px;padding:12px;font-size:0.9rem;color:#111111;margin-bottom:12px;border:1px solid #dddddd}
    select{width:100%;background:#ffffff;color:#111111;border:1px solid #cccccc;border-radius:8px;padding:12px;font-size:0.9rem;margin-bottom:12px}
    .circle-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0}
    .big-circle{width:160px;height:160px;border-radius:50%;background:#f0f0f0;border:3px solid #cccccc;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s}
    .big-circle.live{border-color:#16a34a;box-shadow:0 0 30px rgba(22,163,74,0.25)}
    .pin{font-size:2.5rem;margin-bottom:8px}
    .ctext{font-size:0.75rem;font-weight:bold;letter-spacing:2px;color:#666666}
    .big-circle.live .ctext{color:#16a34a}
    .gdot{width:40px;height:40px;border-radius:50%;background:#16a34a;margin-bottom:8px;display:none;box-shadow:0 0 15px rgba(22,163,74,0.4)}
    .big-circle.live .gdot{display:block}
    .big-circle.live .pin{display:none}
    .badge{padding:8px 20px;border-radius:20px;font-size:0.8rem;font-weight:bold;border:1px solid #cccccc;color:#666666;display:flex;align-items:center;gap:8px}
    .badge.live{border-color:#16a34a;color:#16a34a}
    .bdot{width:8px;height:8px;border-radius:50%;background:#aaaaaa}
    .bdot.live{background:#16a34a}
    .irow{display:flex;gap:10px}
    .icard{flex:1;background:#f9f9f9;border-radius:12px;padding:14px;border:1px solid #dddddd}
    .ilabel{font-size:0.65rem;letter-spacing:1px;color:#666666;margin-bottom:6px}
    .ivalue{font-size:1.3rem;font-weight:bold;color:#1a1a1a}
    .ivalue.g{color:#16a34a}
    .gbox{background:#f9f9f9;border-radius:12px;padding:14px;border:1px solid #dddddd}
    .glabel{font-size:0.65rem;letter-spacing:1px;color:#666666;margin-bottom:6px}
    .gval{font-size:0.9rem;font-weight:bold;color:#111111}
    .rstop{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #eeeeee}
    .rstop:last-child{border-bottom:none}
    .sdot{width:12px;height:12px;border-radius:50%;background:#cccccc;flex-shrink:0}
    .sdot.cur{background:#f39c12;box-shadow:0 0 8px rgba(243,156,18,0.4)}
    .sname{flex:1;font-size:0.85rem;color:#111111}
    .sstatus{font-size:0.72rem;color:#888888}
    .sstatus.here{color:#f39c12;font-weight:bold}
    .sbox{background:#f9f9f9;border-radius:12px;padding:14px;border:1px solid #dddddd}
    .stitle{font-size:0.8rem;color:#1a1a1a;margin-bottom:10px;font-weight:bold}
    .slink{background:#ffffff;border-radius:8px;padding:10px 12px;font-size:0.75rem;color:#555555;word-break:break-all;border:1px solid #dddddd}
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:1.5rem">🚌</span>
    <div>
      <div class="htitle">GIT Driver Panel</div>
      <div class="hsub">KLS Gogte Institute of Technology, Belagavi</div>
    </div>
  </div>
  <div class="clock" id="clock">00:00</div>
</div>

<div class="content">

  <div class="card">
    <div class="card-title">⚙️ YOUR ASSIGNMENT</div>
    <div class="flabel">Bus Number</div>
    <select id="busSelect" onchange="onBusChange()">
      <option value="">— Select your bus —</option>
      <option value="bus1">Bus 1 — KA-22-C-8592 (Mahantesh Nagar)</option>
      <option value="bus2">Bus 2 — KA-22-C-8604 (Ramteerth Nagar)</option>
      <option value="bus3">Bus 3 — KA-22-D-1534 (Hanuman Nagar)</option>
      <option value="bus4">Bus 4 — KA-22-AA-1912 (Vadagaon)</option>
      <option value="bus5">Bus 5 — KA-22-AA-1913 (RC Nagar)</option>
      <option value="bus6">Bus 6 — KA-22-AA-5972 (Vadagaon)</option>
      <option value="bus7">Bus 7 — KA-22-B-9270 (Kakati)</option>
      <option value="bus8">Bus 8 — KA-22-C-0080 (CBT/Bogar Ves)</option>
      <option value="bus9">Bus 9 — KA-22-C-0081 (Bhagya Nagar)</option>
      <option value="bus10">Bus 10 — KA-22-C-4276 (Khanapur)</option>
      <option value="bus11">Bus 11 — KA-22-C-5924 (RC Nagar)</option>
      <option value="bus12">Bus 12 — KA-22-C-5762 (Shahu Nagar)</option>
      <option value="bus13">Bus 13 — KA-22-C-5764 (Uchagoan)</option>
      <option value="bus14">Bus 14 — KA-22-C-5781 (Shahapur)</option>
      <option value="bus15">Bus 15 — KA-22-D-3826 (Kakati)</option>
      <option value="bus16">Bus 16 — KA-22-D-3730 (Ramteerth Nagar)</option>
    </select>
    <div class="flabel">Trip</div>
    <select id="tripSelect">
      <option value="morning">Morning Pickup — 7:30 AM</option>
      <option value="drop0">Morning Pickup — 9:00 AM</option>
      <option value="drop1">Afternoon Drop — 1:30 PM</option>
      <option value="drop2">Evening Drop — 4:00 PM</option>
      <option value="drop3">Evening Drop — 5:15 PM</option>
    </select>
  </div>

  <div class="card">
    <div class="circle-wrap">
      <div class="big-circle" id="bigCircle" onclick="toggleTracking()">
        <div class="gdot"></div>
        <div class="pin">📍</div>
        <div class="ctext" id="ctext">TAP TO SHARE</div>
      </div>
      <div class="badge" id="badge">
        <div class="bdot" id="bdot"></div>
        <span id="btext">Location OFF</span>
      </div>
    </div>
  </div>

  <div class="irow">
    <div class="icard">
      <div class="ilabel">GPS UPDATES</div>
      <div class="ivalue" id="gpsCount">0</div>
    </div>
    <div class="icard">
      <div class="ilabel">NEXT STOP</div>
      <div class="ivalue g" id="nextStop">—</div>
    </div>
  </div>

  <div class="gbox">
    <div class="glabel">CURRENT GPS</div>
    <div class="gval" id="gpsVal">Not sharing</div>
  </div>

  <div class="card">
    <div class="card-title">🗺️ ROUTE PROGRESS</div>
    <div id="routeList"><p style="color:#888888;font-size:0.85rem">Select a bus to see route</p></div>
  </div>

  <div class="sbox">
    <div class="stitle">🔗 Share this link with students</div>
    <div class="slink" id="shareLink">Select a bus to generate link</div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    databaseURL:"https://college-bus-tracker-11fce-default-rtdb.firebaseio.com"
  });
  const db = firebase.database();

  setInterval(()=>{
    const n=new Date();
    document.getElementById('clock').innerText=
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  },1000);

  const routes={
    bus1:["KLS GIT","Bogar Ves","Fish Market","Arun Theatre","CBT","RTO","Mahantesh Nagar"],
    bus2:["KLS GIT","RC Nagar","Utsav","Channamma Circle","Mahantesh Nagar","Ramteerth Nagar"],
    bus3:["KLS GIT","Bogar Ves","Congress Road","Sadashiv Nagar","TV Centre","Hanuman Nagar"],
    bus4:["KLS GIT","RPD","Goa Ves","Nath Pai Circle","Vadagaon"],
    bus5:["KLS GIT","Fort Circle","Gandhi Nagar","Shindoli Cross","Marihal","RC Nagar"],
    bus6:["KLS GIT","RPD","Goa Ves","Nath Pai Circle","Vadagaon"],
    bus7:["KLS GIT","Machche","BCM Hostel","Khanapur"],
    bus8:["KLS GIT","Goa Ves","Fish Market","Channamma Circle","RTO","CBT","Bogar Ves"],
    bus9:["KLS GIT","KLE Engg College","Raghunath Peth","Bhagya Nagar"],
    bus10:["KLS GIT","Machche","BCM Hostel","Khanapur"],
    bus11:["KLS GIT","Guru Prasad Colony","Mandoli Road","RC Nagar"],
    bus12:["KLS GIT","Congress Road","Camp","Nehru Nagar","Shahu Nagar"],
    bus13:["KLS GIT","Arun Theatre","Fish Market","Vinayak Nagar","Sulga","Uchagoan"],
    bus14:["KLS GIT","Utsav","RPD","Goa Ves","Tukaram Bank","Shahapur"],
    bus15:["KLS GIT","Bogar Ves","Channamma Circle","Azam Nagar","Indal","Kakati"],
    bus16:["KLS GIT","Bogar Ves","Channamma Circle","Srinagar Garden","Ganesh Chouk","Ramteerth Nagar"]
  };

  let isTracking=false, watchId=null, gpsCount=0, selBus='';

  function onBusChange(){
    selBus=document.getElementById('busSelect').value;
    if(!selBus) return;
    const r=routes[selBus];
    document.getElementById('nextStop').innerText=r[r.length-1];
    let html='';
    r.forEach((s,i)=>{
      html+=`<div class="rstop">
        <div class="sdot ${i===0?'cur':''}"></div>
        <div class="sname">${s}</div>
        <div class="sstatus ${i===0?'here':''}">${i===0?'● Here':'Upcoming'}</div>
      </div>`;
    });
    document.getElementById('routeList').innerHTML=html;
    document.getElementById('shareLink').innerText='college-bus-tracker-alpha.vercel.app?bus='+selBus;
  }

  function toggleTracking(){
    if(!selBus){ alert('Please select your bus first!'); return; }
    isTracking ? stopTracking() : startTracking();
  }

  function startTracking(){
    isTracking=true;
    document.getElementById('bigCircle').classList.add('live');
    document.getElementById('ctext').innerText='SHARING LIVE';
    document.getElementById('badge').classList.add('live');
    document.getElementById('bdot').classList.add('live');
    document.getElementById('btext').innerText='Location LIVE';
    watchId=navigator.geolocation.watchPosition(pos=>{
      const lat=pos.coords.latitude, lng=pos.coords.longitude;
      gpsCount++;
      db.ref('liveLocation/'+selBus).set({lat,lng});
      document.getElementById('gpsCount').innerText=gpsCount;
      document.getElementById('gpsVal').innerText=lat.toFixed(5)+', '+lng.toFixed(5);
    },err=>{
      document.getElementById('gpsVal').innerText='GPS Error: '+err.message;
    },{enableHighAccuracy:true,maximumAge:0});
  }

  function stopTracking(){
    isTracking=false;
    if(watchId) navigator.geolocation.clearWatch(watchId);
    db.ref('liveLocation/'+selBus).remove();
    document.getElementById('bigCircle').classList.remove('live');
    document.getElementById('ctext').innerText='TAP TO SHARE';
    document.getElementById('badge').classList.remove('live');
    document.getElementById('bdot').classList.remove('live');
    document.getElementById('btext').innerText='Location OFF';
    document.getElementById('gpsVal').innerText='Not sharing';
    gpsCount=0;
    document.getElementById('gpsCount').innerText='0';
  }
</script>
</body>
</html>
