// ── HELPERS ───────────────────────────────────────────
function getDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getNearestStop(busKey,busLat,busLng){
  const route=busRoutes[busKey];if(!route)return null;
  let nearest=null,minDist=Infinity;
  route.forEach(s=>{
    const c=stopCoords[s];if(!c)return;
    const d=getDistance(busLat,busLng,c.lat,c.lng);
    if(d<minDist){minDist=d;nearest={name:s,dist:d};}
  });
  return nearest;
}

// Smooth animation like Google Maps
function animateMarker(marker,fromLat,fromLng,toLat,toLng,ms){
  const t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/ms,1);
    const e=p<0.5?2*p*p:-1+(4-2*p)*p;
    marker.setLatLng([fromLat+(toLat-fromLat)*e,fromLng+(toLng-fromLng)*e]);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

let myBus=localStorage.getItem('git_myBus')||'';
let myStop=localStorage.getItem('git_myStop')||'';

window.saveProfile=function(){
  const bus=document.getElementById('setupBus').value;
  const stop=document.getElementById('setupStop').value;
  if(!bus||!stop){alert('Please select both!');return;}
  localStorage.setItem('git_myBus',bus);
  localStorage.setItem('git_myStop',stop);
  myBus=bus;myStop=stop;
  document.getElementById('setupModal').classList.remove('show');
  applyProfile();selectBus();
};
