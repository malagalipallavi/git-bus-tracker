}
.live-dot{
  width:6px;height:6px;border-radius:50%;

}

  cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;

  // Blue travelled route
  blueRoute = L.polyline([],{
    color:'#2563eb',
    weight:7
  }).addTo(map);

  map.fitBounds(routeLine.getBounds(),{
    padding:[40,40]
  });

  if(liveRef) liveRef.off();

  liveRef = db.ref('liveLocation/' + busKey);

  liveRef.on('value', snapshot=>{

    const data = snapshot.val();

    if(!data){

      document.getElementById('driverInfo').innerHTML =
        "⚠ Driver offline";

      return;
    }

    const lat = data.lat;
    const lng = data.lng;

    const busLatLng = [lat,lng];

    // Create marker first time
    if(!busMarker){

      busMarker = L.marker(busLatLng,{
        icon:L.divIcon({
          html:`
          <div style="
            font-size:32px;
          ">🚌</div>
          `,
          className:'',
          iconSize:[32,32]
        })
      }).addTo(map);

    }else{

      busMarker.setLatLng(busLatLng);

    }

    map.panTo(busLatLng);

    travelledPath.push(busLatLng);

    blueRoute.setLatLngs(travelledPath);

    calculateETA(busLatLng, route);

  });

};
function calculateETA(busPos, route){

  let nearestIndex = 0;
  let minDist = Infinity;

  route.forEach((point,index)=>{

    const d = map.distance(busPos, point);

    if(d < minDist){
      minDist = d;
      nearestIndex = index;
    }

  });

  const nextStop = route[nearestIndex+1];

  if(!nextStop) return;

  const distMeters = map.distance(busPos, nextStop);

  const distKm = (distMeters/1000).toFixed(2);

  const etaMin = Math.ceil((distMeters/1000)/25*60);

  document.getElementById('etaCard').style.display='block';

  document.getElementById('etaTime').innerHTML = etaMin;

  document.getElementById('etaStop').innerHTML =
    "📍 Upcoming Stop";

  document.getElementById('etaDist').innerHTML =
    distKm + " km away";

}
// ================= SIMULATION =================
window.toggleSim = function(){

  if(!currentBus){
    alert("Select bus first");
    return;
  }

  if(simulation){
    clearInterval(simulation);
    simulation = null;

    document.getElementById('simBtn').innerHTML =
      "▶ Start Bus Simulation";

    document.getElementById('simBtn').classList.remove('stop');

    document.getElementById('simStatus').innerHTML =
      "Simulation stopped";

    return;
  }

  document.getElementById('simBtn').innerHTML =
    "⏹ Stop Simulation";

  document.getElementById('simBtn').classList.add('stop');

  const route = routes[currentBus];

  simulation = setInterval(()=>{

    pointIndex++;

    if(pointIndex >= route.length){
      pointIndex = 0;
    }

    const nextPoint = route[pointIndex];

    busMarker.setLatLng(nextPoint);

    busMarker.bindPopup(
      `<b>${busData[currentBus].name}</b><br>
      Driver: ${busData[currentBus].driver}`
    );

    document.getElementById('etaCard').style.display='block';

    document.getElementById('etaTime').innerHTML =
      Math.floor(Math.random()*5)+1;

    document.getElementById('etaStop').innerHTML =
      "Next Stop";

    document.getElementById('etaDist').innerHTML =
      "Bus moving...";

  },3000);

  document.getElementById('simStatus').innerHTML =
    "Simulation running";
};

// ================= PROFILE =================
function applyProfile(){

  const savedBus = localStorage.getItem('git_myBus');

  if(savedBus){

    document.getElementById('busSelect').value = savedBus;

    selectBus();
  }
}

applyProfile();

});
