<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KLS GIT Bus Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Outfit',sans-serif;overflow:hidden;background:#f4f6f9}
#map{height:100vh;width:100%}

#topbar{
  position:absolute;top:14px;left:50%;
  transform:translateX(-50%);
  background:white;padding:12px 16px 10px;
  border-radius:20px;z-index:1000;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
  min-width:330px;max-width:92vw;
  border:1px solid rgba(0,0,0,0.07);
}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px solid #f0f0f0;
}
.topbar-brand .logo{font-size:22px}
.topbar-brand h1{font-size:14px;font-weight:800;color:#111;letter-spacing:-0.3px}
.topbar-brand p{font-size:10px;color:#888;margin-top:1px}
.live-pill{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:100px;padding:3px 10px;
  font-size:10px;font-weight:700;color:#16a34a;letter-spacing:0.5px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:#16a34a;animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.dropdown-style{
  width:100%;padding:9px 12px;
  font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;
  border-radius:10px;border:1.5px solid #e5e7eb;
  background:#fafafa;color:#111;
  margin-bottom:8px;outline:none;cursor:pointer;
}

#info{font-size:13px;font-weight:600;color:#222;margin-top:4px}
#driverInfo{font-size:11px;color:#777;margin-top:2px}

#profileBanner{
  margin-top:8px;background:#eff6ff;
  border:1px solid #bfdbfe;border-radius:10px;
  padding:8px 12px;font-size:12px;color:#1d4ed8;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
#profileText{font-weight:600}
#changeProfileBtn{
  background:white;border:1px solid #3b82f6;color:#3b82f6;
  border-radius:6px;padding:3px 8px;font-size:11px;
  cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;font-weight:600;
}

#etaCard{
  position:absolute;bottom:28px;right:14px;left:14px;
  margin:0 auto;max-width:340px;
  z-index:1000;background:white;
  border-radius:18px;padding:16px 20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
  display:none;
  border:1px solid rgba(0,0,0,0.06);
  animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.eta-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:4px}
.eta-time{font-size:38px;font-weight:800;color:#1a73e8;line-height:1;letter-spacing:-1px}
.eta-unit{font-size:14px;font-weight:700;color:#1a73e8;margin-left:3px}
.eta-destination{font-size:13px;color:#111;font-weight:700;margin-top:6px}
.eta-dist{font-size:12px;color:#f97316;font-weight:600;margin-top:2px}

#setupModal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  z-index:2000;align-items:center;justify-content:center;
}
#setupModal.show{display:flex}
#setupBox{
  background:white;border-radius:24px;
  padding:24px;width:min(360px,92vw);
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
#setupBox h2{font-size:18px;font-weight:800;color:#111;margin-bottom:6px;text-align:center}
#setupBox p{font-size:12px;color:#666;margin-bottom:16px;text-align:center;line-height:1.5}
#setupBox label{font-size:11px;color:#444;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase}
#setupBox select{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid #e5e7eb;font-size:13px;margin-bottom:14px;background:#fafafa;font-family:'Outfit',sans-serif;outline:none}
#saveBtn{width:100%;padding:13px;background:#1a73e8;color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
</style>

      <option value="Shahapur">Shahapur</option>
      <option value="Kakati">Kakati</option>

</div>

<div id="topbar">

    <div>

// Shift Change Dropdown Trigger Handler
window.onShiftChange = function() {
  const shift = document.getElementById('shiftSelect').value;
  const busSelect = document.getElementById('busSelect');
  busSelect.innerHTML = '<option value="">-- Choose Bus --</option>';
  
  if(!shift) return;
  
  shiftBuses[shift].forEach(bus => {
    const opt = document.createElement('option');
    opt.value = bus.id;
    opt.textContent = bus.label;
    busSelect.appendChild(opt);
  });
};

// Primary Async OSRM Road Distance & Duration Engine Wrapper Loop
async function processRoadETA(driverLat, driverLng, busKey) {
  let targetLat = campusLocation.lat;
  let targetLng = campusLocation.lng;
  let targetLabel = "ETA TO CAMPUS";
  let destName = "KLS GIT Campus";

  // Check direction dynamically: If morning shift, track toward student's custom stop. Otherwise track toward campus.
  if(busKey.startsWith('m730') || busKey.startsWith('m900')) {
    const userStop = localStorage.getItem('git_student_stop');
    if (userStop) {
      targetLabel = "ETA TO YOUR STOP";
      destName = userStop;
      // Fetch coordinates for matching stop profiles via an OpenStreetMap Nominatim request
      try {
        const geoReq = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(userStop + ", Belagavi")}`);
        const geoRes = await geoReq.json();
        if(geoRes && geoRes.length > 0) {
          targetLat = parseFloat(geoRes[0].lat);
          targetLng = parseFloat(geoRes[0].lon);
        }
      } catch(e) { console.error("Geocoding failed; defaulting routing targets to GIT Campus gates."); }
    }
  }

  try {
    const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${driverLng},${driverLat};${targetLng},${targetLat}?overview=false`);
    const data = await response.json();
    
    if (data.code === 'Ok' && data.routes.length > 0) {
      const minutes = Math.round(data.routes[0].duration / 60);
      const distance = (data.routes[0].distance / 1000).toFixed(1);
      
      document.getElementById('etaTargetLabel').innerText = targetLabel;
      document.getElementById('etaTime').innerText = minutes;
      document.getElementById('etaDestination').innerText = `Destination: ${destName}`;
      document.getElementById('etaDist').innerText = `${distance} km remaining along street path`;
    }
  } catch(err) { console.error("Routing error:", err); }
}

// Map selection initialization workflow execution sequence
window.selectBus = function() {
  const busKey = document.getElementById('busSelect').value;
  if(!busKey) return;

  if(currentBusKey && dbListenerRef) {
    db.ref('liveLocation/' + currentBusKey).off('value', dbListenerRef);
  }

  currentBusKey = busKey;
  locationPoints = [];
  
  document.getElementById('info').innerText = "Connecting to Driver Data Feed...";
  document.getElementById('driverInfo').innerText = `Driver: ${busMeta[busKey]?.driver || 'Assigned'}`;

  if(busMarker) map.removeLayer(busMarker);
  if(liveHistoryPath) map.removeLayer(liveHistoryPath);
  busMarker = null;

  liveHistoryPath = L.polyline([], { color: '#1a73e8', weight: 4, opacity: 0.8 }).addTo(map);

  // Synchronized listening script capturing realtime changes pushed by driver panel
  dbListenerRef = db.ref('liveLocation/' + busKey).on('value', snap => {
    const data = snap.val();
    if(!data || !data.lat || !data.lng) {
      document.getElementById('info').innerText = "🔴 Bus is currently OFFLINE";
      document.getElementById('etaCard').style.display = 'none';
      return;
    }

    const latlng = [data.lat, data.lng];
    locationPoints.push(latlng);
    liveHistoryPath.setLatLngs(locationPoints);

    if(!busMarker) {
      busMarker = L.marker(latlng, {
        icon: L.divIcon({
          html: `<div style="font-size:30px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">🚌</div>`,
          className: '', iconSize: [30, 30], iconAnchor: [15, 15]
        })
      }).addTo(map);
    } else {
      busMarker.setLatLng(latlng);
    }

    map.setView(latlng, map.getZoom());
    document.getElementById('info').innerText = "🟢 System Connection Active";
    document.getElementById('etaCard').style.display = 'block';
    
    processRoadETA(data.lat, data.lng, busKey);
  });
};

// Local storage management interface functions 
function saveProfile() {
  const stop = document.getElementById('setupStop').value;
  if(!stop) return alert("Please select a stop location baseline.");
  localStorage.setItem('git_student_stop', stop);
  document.getElementById('profileText').innerText = `Stop: ${stop}`;
  document.getElementById('setupModal').classList.remove('show');
  if(currentBusKey) selectBus(); 
}

function showSetup() { document.getElementById('setupModal').classList.add('show'); }

// Deep link parser check algorithm updates configuration dynamically via URL parameters automatically
window.addEventListener('DOMContentLoaded', () => {
  const stop = localStorage.getItem('git_student_stop');
  if(!stop) { showSetup(); } else { document.getElementById('profileText').innerText = `Stop: ${stop}`; }

  const urlParams = new URLSearchParams(window.location.search);
  const deepLinkBus = urlParams.get('bus'); // Checks for matching ?bus=m730_b1 query targets
  
  if(deepLinkBus && busMeta[deepLinkBus]) {
    let targetShift = "";
    for(let shiftKey in shiftBuses) {
      if(shiftBuses[shiftKey].some(b => b.id === deepLinkBus)) { targetShift = shiftKey; break; }
    }
    if(targetShift) {
      document.getElementById('shiftSelect').value = targetShift;
      onShiftChange();
      document.getElementById('busSelect').value = deepLinkBus;
      selectBus();
    }
  }
});
